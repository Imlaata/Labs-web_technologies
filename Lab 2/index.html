<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Лаб 2</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; line-height: 1.6; background-color: #f4f4f4; }
        .task-container { background: white; border: 1px solid #ddd; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .result { font-weight: bold; color: #e67e22; }
    </style>
</head>
<body>

<h1> Лабораторна 2 </h1>

<div class="task-container">
    <h2>1. </h2>
    <p><b>Максимум та мінімум у масиві:</b> <span id="res-min-max" class="result"></span></p>
    <p><b>Порівняння об'єктів:</b> <span id="res-compare-obj" class="result"></span></p>
</div>

<div class="task-container">
    <h2>2. </h2>
    <p><b>Перевірка діапазону (число 25 у 10-50):</b> <span id="res-range" class="result"></span></p>
    <p><b>Оператор NOT (!):</b> <span id="res-not" class="result"></span></p>
</div>

<div class="task-container">
    <h2>3. </h2>
    <p><b>Оцінка студента:</b> <span id="res-grade" class="result"></span></p>
    <p><b>Визначення сезону (через if):</b> <span id="res-season-if" class="result"></span></p>
    <p><b>Визначення сезону (через ?):</b> <span id="res-season-ternary" class="result"></span></p>
</div>

<script src="script.js"></script>
</body>
</html>
